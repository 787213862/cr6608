name: OpenWrt Builder

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/Heleguo/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Install SSRP and Dependencies
      run: |
        cd openwrt
        # 拉取 SSRP 插件及依赖
        git clone https://github.com/fw876/helloworld package/helloworld
        git clone https://github.com/immortalwrt/luci-compat package/luci-compat
        
        # 强制开启 SSRP 和 Hy2 支持
        echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Hysteria=y" >> .config
        
        # 更新并安装 feed
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Compile the firmware
      run: |
        cd openwrt
        make defconfig
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_Firmware
        path: openwrt/bin/targets/*/*/*.bin
