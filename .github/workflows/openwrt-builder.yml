name: OpenWrt Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Download Source Code
      run: |
        # 直接通过 curl 下载 ZIP，这比 git clone 稳定得多
        curl -L https://github.com/Heleguo/lede/archive/refs/heads/master.zip -o lede.zip
        unzip lede.zip
        mv lede-master openwrt

    - name: Install Dependencies & Plugins
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev
        cd openwrt
        # 下载 SSRP 和依赖
        curl -L https://github.com/fw876/helloworld/archive/refs/heads/master.zip -o helloworld.zip
        unzip helloworld.zip && mv helloworld-master package/helloworld
        git clone https://github.com/immortalwrt/luci-compat package/luci-compat
        
        # 强制开启 Hy2 支持
        echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Hysteria=y" >> .config

    - name: Compile
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make defconfig
        make -j$(nproc)

    - name: Upload
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_Firmware
        path: openwrt/bin/targets/*/*/*.bin
